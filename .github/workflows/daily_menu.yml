name: Daily menu update

on:
  schedule:
    # Runs twice daily (12:00 UTC and 00:00 UTC)
    - cron: '0 12,0 * * *'
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: write
    
    timeout-minutes: 30

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.4.1

    - name: Cache Ruby gems
      uses: actions/cache@v3
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-ruby-${{ hashFiles('Gemfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-ruby-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxml2 libxslt1-dev --fix-missing

    - name: Install dependencies
      run: MAKEFLAGS="-j$(nproc)" gem install nokogiri open-uri firebase google-cloud-firestore

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}'

    - name: Get UFPR menus
      id: ufpr
      env:
        FIREBASE_KEY: ${{ secrets.SECRET }} 
        BASE_URL: ${{ secrets.BASE_URI }}
      run: ruby UFPR.rb
      continue-on-error: true

    - name: Notify UFPR scraping failures via GitHub Issue
      if: always() && steps.ufpr.outputs.has_failures == 'true' || hashFiles('ufpr_failures.md') != ''
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ ! -f ufpr_failures.md ]; then
          echo "No failure report found. Skipping issue creation."
          exit 0
        fi
        gh label create "scraper-failure" --color "D93F0B" --description "Automated alert from scraper" 2>/dev/null || true
        TITLE="⚠️ UFPR Scraper: partial failure — $(date -u +'%Y-%m-%d')"
        BODY=$(cat ufpr_failures.md)
        gh issue create --title "$TITLE" --body "$BODY" --label "scraper-failure"

    - name: Get UFABC menus
      env:
        FIREBASE_KEY: ${{ secrets.SECRET }} 
        BASE_URL: ${{ secrets.BASE_URI }}
      run: ruby UFABC.rb
      continue-on-error: true

